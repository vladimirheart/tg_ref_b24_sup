<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Каналы — Support Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="with-sidebar sidebar-pinned">
<div th:replace="~{fragments/navbar :: navbar('channels')}"></div>
<main class="main-content container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1">Каналы</h1>
            <p class="text-muted mb-0">Активные каналы бота и их параметры.</p>
        </div>
    </div>
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Бот</th>
                    <th>Публичная форма</th>
                    <th>Активен</th>
                    <th class="text-end">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(channels)}">
                    <td colspan="6" class="text-center text-muted py-4">Каналы отсутствуют</td>
                </tr>
                <tr th:each="channel : ${channels}"
                    th:attr="data-channel-id=${channel.id},data-public-id=${channel.publicId}">
                    <td th:text="${channel.id}"></td>
                    <td>
                        <div class="fw-semibold" th:text="${channel.channelName}"></div>
                        <div class="text-muted small" th:text="${channel.botName} ?: '—'"></div>
                    </td>
                    <td th:text="${channel.botUsername} ?: '—'"></td>
                    <td>
                        <div class="small font-monospace mb-1" data-role="public-id" th:text="${channel.publicId} ?: '—'"></div>
                        <a class="small" target="_blank" rel="noopener"
                           th:if="${channel.publicId != null and !#strings.isEmpty(channel.publicId)}"
                           th:href="@{'/public/forms/' + ${channel.publicId}}"
                           data-role="public-link"
                           th:text="@{'/public/forms/' + ${channel.publicId}}"></a>
                        <span class="small text-muted" th:if="${channel.publicId == null or #strings.isEmpty(channel.publicId)}">Ссылка не настроена</span>
                    </td>
                    <td>
                        <span th:classappend="${channel.active} ? 'badge text-bg-success' : 'badge text-bg-secondary'"
                              th:text="${channel.active} ? 'Да' : 'Нет'"></span>
                    </td>
                    <td class="text-end">
                        <div class="btn-group btn-group-sm" role="group">
                            <button type="button" class="btn btn-outline-secondary" data-action="copy-public-link">Скопировать</button>
                            <button type="button" class="btn btn-outline-danger" data-action="regenerate-public-id">Регенерировать</button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div id="channelsActionAlert" class="alert alert-success mt-3 d-none" role="alert"></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script th:src="@{/js/channels-public-links.js}"></script>
</body>
</html>
