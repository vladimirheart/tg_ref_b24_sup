<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Ops — iguana</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/iguana-icon.svg}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="with-sidebar sidebar-pinned">
<div th:replace="~{fragments/navbar :: navbar('ai-ops')}"></div>

<main class="main-content container-fluid py-4">
    <div class="page-header-card mb-4">
        <span class="page-kicker">Operations</span>
        <h1 class="page-title">AI Ops</h1>
        <p class="page-subtitle">Отдельная панель для мониторинга качества AI-агента, алертов и журналов событий.</p>
    </div>

    <section class="card shadow-sm mb-4">
        <div class="card-header bg-white d-flex flex-wrap justify-content-between align-items-center gap-2">
            <strong>AI Monitoring</strong>
            <button class="btn btn-sm btn-outline-secondary" id="aiOpsRefresh" type="button">Обновить</button>
        </div>
        <div class="card-body">
            <div class="small text-muted mb-2" id="aiOpsState">Загрузка…</div>
            <div class="row g-2 mb-3">
                <div class="col-md-3 col-6"><div class="border rounded p-2"><div class="small text-muted">Auto-reply rate</div><div class="fw-semibold" id="aiOpsAutoReplyRate">—</div></div></div>
                <div class="col-md-3 col-6"><div class="border rounded p-2"><div class="small text-muted">Assist usage rate</div><div class="fw-semibold" id="aiOpsAssistRate">—</div></div></div>
                <div class="col-md-3 col-6"><div class="border rounded p-2"><div class="small text-muted">Escalation rate</div><div class="fw-semibold" id="aiOpsEscalationRate">—</div></div></div>
                <div class="col-md-3 col-6"><div class="border rounded p-2"><div class="small text-muted">Correction rate</div><div class="fw-semibold" id="aiOpsCorrectionRate">—</div></div></div>
            </div>
            <div class="small fw-semibold mb-1">Алерты</div>
            <div id="aiOpsAlerts" class="small text-muted mb-3">—</div>
            <div class="small fw-semibold mb-1">Runbook</div>
            <ul id="aiOpsRunbook" class="small ps-3 mb-3"></ul>
            <div class="small fw-semibold mb-1">События</div>
            <div class="d-flex flex-wrap gap-2 mb-2">
                <input type="text" class="form-control form-control-sm ai-ops-filter-input" id="aiOpsEventType" placeholder="event type">
                <input type="text" class="form-control form-control-sm ai-ops-filter-input" id="aiOpsActor" placeholder="actor">
                <button class="btn btn-sm btn-outline-secondary" id="aiOpsApplyFilters" type="button">Применить</button>
                <button class="btn btn-sm btn-outline-secondary" id="aiOpsExportCsv" type="button">Экспорт CSV</button>
            </div>
            <div id="aiOpsEvents" class="small text-muted">—</div>
        </div>
    </section>
    <section class="card shadow-sm mb-4">
        <div class="card-header bg-white d-flex flex-wrap justify-content-between align-items-center gap-2">
            <strong>AI Solution Memory</strong>
            <button class="btn btn-sm btn-outline-secondary" id="aiOpsMemoryRefresh" type="button">Refresh</button>
        </div>
        <div class="card-body">
            <div class="d-flex flex-wrap gap-2 mb-2">
                <input type="text" class="form-control form-control-sm ai-ops-filter-input" id="aiOpsMemoryQuery" placeholder="Search by question/answer">
                <button class="btn btn-sm btn-outline-secondary" id="aiOpsMemorySearch" type="button">Search</button>
            </div>
            <div class="small text-muted mb-2" id="aiOpsMemoryState">Loading...</div>
            <div id="aiOpsMemoryList" class="small text-muted">—</div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script th:src="@{/js/ai-ops.js}"></script>
</body>
</html>
